apiVersion: apps/v1
kind: Deployment
metadata:
  name: falkordb
  namespace: agentic-core
  labels:
    app: falkordb
    app.kubernetes.io/part-of: agentic-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: falkordb
  template:
    metadata:
      labels:
        app: falkordb
    spec:
      containers:
        - name: falkordb
          image: falkordb/falkordb:latest
          ports:
            - name: falkordb
              containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "-p", "6379", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "-p", "6379", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 15
