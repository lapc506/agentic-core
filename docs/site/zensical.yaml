  - Getting Started:
    - getting-started.md
    - standalone.md
    - tui.md
  - API Reference:
    - api/rest.md
    - api/websocket.md
    - api/ollama.md
    - api/a2a.md
  - Guides:
    - guides/providers.md
    - guides/personas.md
    - guides/soul-md.md
  - Architecture:
    - architecture/overview.md
    - architecture/deployment.md

repo:
  url: https://github.com/lapc506/agentic-core

features:
  - search
  - navigation.tabs
  - navigation.sections
  - content.code.copy
