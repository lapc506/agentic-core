site:
  name: Agent Studio
  url: https://lapc506.github.io/agentic-core/

theme:
  variant: modern
  palette:
    primary: custom
    accent: custom
  custom_colors:
    primary: "#3B6FE0"
    accent: "#6B9FFF"
  font:
    text: Ubuntu
    code: Ubuntu Mono
  logo: img/logo.svg
  icon:
    repo: github

nav:
