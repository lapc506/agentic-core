apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agentic-core
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/lapc506/agentic-core.git
    targetRevision: main
    path: deployment/helm/agentic-core
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: agentic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
