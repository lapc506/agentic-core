apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-agentic-core
  labels:
    app: agentic-core
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: agentic-core
  template:
    metadata:
      labels:
        app: agentic-core
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.metrics.port }}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: agentic-core
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: websocket
              containerPort: {{ .Values.service.websocket.port }}
            - name: grpc
              containerPort: {{ .Values.service.grpc.port }}
            - name: metrics
              containerPort: {{ .Values.service.metrics.port }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
